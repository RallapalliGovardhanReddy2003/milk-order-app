# ===============================
# APPLICATION
# ===============================
spring.application.name=milk-order-app
server.port=8070


# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/milkorderdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# HIBERNATE / JPA
# ===============================
# IMPORTANT:
# Use update in development
# Use validate in production
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# LOGGING (DEBUG FRIENDLY)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG


# ===============================
# JWT SETTINGS (OPTIONAL BUT RECOMMENDED)
# ===============================
jwt.secret=milkordersecretkeymilkordersecretkey
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000


# ===============================
# JACKSON CONFIG
# ===============================
spring.jackson.serialization.fail-on-empty-beans=false


# ===============================
# LIVE RELOAD (Optional)
# ===============================
spring.devtools.livereload.enabled=true